corner-radius = 8.0;
corner-radius-rules = [
  "8:window_type = 'dock'"
];
rounded-corners-exclude = [];
round-borders = 20;
round-borders-exclude = [];

backend = "glx";
glx-copy-from-front = false;
use-damage = false;

shadow = false;
no-dnd-shadow = true;
no-dock-shadow = true;
shadow-radius = 3;
shadow-offset-x = 1;
shadow-offset-y = 1;
shadow-opacity = 0.1;
shadow-exclude = [
  "! name~=''",
  "window_type = 'dock'",
  "n:e:Menu",
  "name = 'Notification'",
  "name = 'xfce4-notifyd'",
  "name *= 'compton'",
  "class_g ?= 'Notify-osd'",
  "class_g ?= 'Xfce4-notifyd'",
  "class_g ?= 'gnome-pie'",
  "class_g ?= 'gnome-pie-807'",
  "class_g ?= 'Xfce4-power-manager'"
];
shadow-ignore-shaped = true;

popup-menu-opacity = 0.99;
dropdown-menu-opacity = 0.99;
active-opacity = 0.99;
inactive-opacity = 0.99;
frame-opacity = 0.35;
inactive-opacity-override = false;
alpha-step = 0.06;
inactive-dim = 0.0;
opacity-rule = [
  "100:class_g = 'vlc'",
  "100:class_g = 'PPSSPPSDL'",
  "100:class_g = 'AppRun.wrapped'",
  "100:class_g = 'mpv'",
  "100:class_g = 'Tvlite'",
  "100:class_g = 'Io.github.celluloid_player.Celluloid'",
  "100:class_g = 'yuki-iptv'",
  "90:class_g = 'scrcpy'",
  "90:class_g = 'dropdown_menu'",
  "90:class_g = 'popup_menu'",
  "90:class_g = 'menu'",
  "90:class_g = 'dialog'",
  "90:class_g = 'Brave-browser'"
];

blur-background = false;
blur-background-frame = false;
blur-background-fixed = false;
blur-method = "none";
blur-background-exclude = [
  "window_type = 'menu'",
  "window_type = 'desktop'",
  "window_type = 'utility'",
  "_GTK_FRAME_EXTENTS && !class_g = 'Google-chrome'",
  "name = 'gnome-pie'",
  "name *= 'vlc'",
  "name *= 'Tvlite'",
  "name = 'AppRun.wrapped'"
];

fading = true;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-exclude = [];

mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-ewmh-active-win = true;
detect-rounded-corners = true;
detect-client-opacity = true;
dbe = false;
paint-on-overlay = true;
unredir-if-possible = true;
focus-exclude = [];
detect-transient = true;
detect-client-leader = true;

wintypes: {
  tooltip = { fade = true; shadow = false; opacity = 0.90; focus = true; };
  menu = { fade = true; shadow = false; opacity = 0.90; focus = true; };
  dropdown_menu = { fade = true; shadow = false; opacity = 0.90; focus = true; };
  popup_menu = { fade = true; shadow = false; opacity = 0.90; focus = true; };
};

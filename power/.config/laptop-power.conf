# Defaults for ~/.local/bin/laptop-power-apply

# other mode "performance"
AC_PROFILE=balanced
BATTERY_PROFILE=power-saver

AC_INTERNAL_RATE=144
BATTERY_INTERNAL_RATE=144

# Blank means leave it.
BATTERY_BRIGHTNESS=

# HDMI/DP outputs turned off automatically on battery.
DISABLE_EXTERNAL_ON_BATTERY=0

# Restart picom on AC/battery changes so the AC/battery compositor policy is used.
RESTART_PICOM_ON_POWER_CHANGE=0

PICOM_AC_CONFIG="$HOME/.config/picom_blur.conf"
PICOM_BATTERY_CONFIG="$HOME/.config/picom_noblur.conf"

# Keep these at 0 so the script does not fight manual Fn+Q/performance changes.
ENFORCE_PROFILE_EACH_POLL=0
ENFORCE_DISPLAY_EACH_POLL=0

# Battery health guard. Prevents accidental dives to 2%.
LOW_BATTERY_AUTO_SUSPEND=1
LOW_BATTERY_SUSPEND_LEVEL=5
LOW_BATTERY_WARN_LEVELS="20 15 10 7 5"

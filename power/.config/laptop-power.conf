# Defaults for ~/.local/bin/laptop-power-apply

# Normal plugged-in workflow. Use "performance" manually for games/renders.
AC_PROFILE=balanced

# Power-cut/mobile workflow.
BATTERY_PROFILE=power-saver

# Restore the internal panel after a battery event.
AC_INTERNAL_RATE=144

# 60 saves the most power. 144 feels nicer but costs more battery.
BATTERY_INTERNAL_RATE=60

# Optional brightnessctl value on battery, e.g. "45%". Blank means leave it.
BATTERY_BRIGHTNESS=

# Set to 1 if you want HDMI/DP outputs turned off automatically on battery.
DISABLE_EXTERNAL_ON_BATTERY=0

# Restart picom on AC/battery changes so the AC/battery compositor policy is used.
RESTART_PICOM_ON_POWER_CHANGE=1

# Picom policy:
# - AC uses the normal config.
# - battery uses the strict low-power config.
PICOM_AC_CONFIG="$HOME/.config/picom.conf"
PICOM_BATTERY_CONFIG="$HOME/.config/picom_noblur.conf"

# Keep these at 0 so the script does not fight manual Fn+Q/performance changes.
ENFORCE_PROFILE_EACH_POLL=0
ENFORCE_DISPLAY_EACH_POLL=0

# Battery health guard. Prevents accidental dives to 2%.
LOW_BATTERY_AUTO_SUSPEND=1
LOW_BATTERY_SUSPEND_LEVEL=5
LOW_BATTERY_WARN_LEVELS="20 15 10 7 5"
